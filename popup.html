<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crunchyroll QOL Improvements</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <section class="panel">
        <header class="panel-header">
          <p class="eyebrow">Crunchyroll QOL Improvements</p>
          <h1>Settings</h1>
        </header>

        <section class="settings-section" aria-labelledby="skip-options-heading">
          <h2 id="skip-options-heading" class="section-title">Skip Options</h2>

          <label class="setting-row" for="hidePersistentSkipButtonsEnabled">
            <span class="setting-copy">
              <span class="setting-title">Hide Persistent Skip Buttons</span>
              <span class="setting-description">Hide Skip Intro, Skip Recap, and Skip Credits after they stay visible for the configured delay.</span>
            </span>
            <span class="toggle-wrap">
              <input id="hidePersistentSkipButtonsEnabled" name="hidePersistentSkipButtonsEnabled" type="checkbox">
              <span class="toggle-ui" aria-hidden="true"></span>
            </span>
          </label>

          <label class="setting-row setting-row--number" for="hidePersistentSkipButtonsAfterSeconds">
            <span class="setting-copy">
              <span class="setting-title">Hide After Seconds</span>
              <span class="setting-description">Choose how long persistent skip buttons remain on screen before the extension hides them.</span>
            </span>
            <span class="number-wrap">
              <input
                id="hidePersistentSkipButtonsAfterSeconds"
                name="hidePersistentSkipButtonsAfterSeconds"
                type="number"
                min="1"
                step="1"
                inputmode="numeric"
              >
            </span>
          </label>
        </section>

        <section class="settings-section" aria-labelledby="auto-skip-heading">
          <h2 id="auto-skip-heading" class="section-title">Auto Skip</h2>

          <label class="setting-row" for="autoSkipRecapEnabled">
            <span class="setting-copy">
              <span class="setting-title">Auto Skip Recap</span>
              <span class="setting-description">Automatically skip recap when the skip button appears.</span>
            </span>
            <span class="toggle-wrap">
              <input id="autoSkipRecapEnabled" name="autoSkipRecapEnabled" type="checkbox">
              <span class="toggle-ui" aria-hidden="true"></span>
            </span>
          </label>

          <label class="setting-row" for="autoSkipIntroEnabled">
            <span class="setting-copy">
              <span class="setting-title">Auto Skip Intro</span>
              <span class="setting-description">Automatically skip intro when the skip button appears.</span>
            </span>
            <span class="toggle-wrap">
              <input id="autoSkipIntroEnabled" name="autoSkipIntroEnabled" type="checkbox">
              <span class="toggle-ui" aria-hidden="true"></span>
            </span>
          </label>

          <label class="setting-row" for="autoSkipCreditsEnabled">
            <span class="setting-copy">
              <span class="setting-title">Auto Skip Credits</span>
              <span class="setting-description">Automatically skip credits when the skip button appears.</span>
            </span>
            <span class="toggle-wrap">
              <input id="autoSkipCreditsEnabled" name="autoSkipCreditsEnabled" type="checkbox">
              <span class="toggle-ui" aria-hidden="true"></span>
            </span>
          </label>

          <label class="setting-row setting-row--number" for="autoSkipDelaySeconds">
            <span class="setting-copy">
              <span class="setting-title">Auto Skip Delay</span>
              <span class="setting-description">Choose how many seconds the countdown waits before auto skip activates.</span>
            </span>
            <span class="number-wrap">
              <input
                id="autoSkipDelaySeconds"
                name="autoSkipDelaySeconds"
                type="number"
                min="0"
                step="1"
                inputmode="numeric"
              >
            </span>
          </label>

          <div class="field-block">
            <span class="setting-copy">
              <span class="setting-title">Series Blacklist</span>
              <span id="seriesAutoSkipDescription" class="setting-description">Open a Crunchyroll watch page to manage Auto Skip for the current series.</span>
            </span>
            <button id="seriesAutoSkipToggle" class="action-button" type="button" disabled>Unavailable</button>
          </div>
        </section>

        <section class="settings-section" aria-labelledby="keybinds-heading">
          <h2 id="keybinds-heading" class="section-title">Keybinds</h2>

          <label class="setting-row" for="enterToSkipEnabled">
            <span class="setting-copy">
              <span class="setting-title">Enable Enter To Skip Keybind</span>
              <span class="setting-description">Use the Enter key to activate supported skip actions on watch pages.</span>
            </span>
            <span class="toggle-wrap">
              <input id="enterToSkipEnabled" name="enterToSkipEnabled" type="checkbox">
              <span class="toggle-ui" aria-hidden="true"></span>
            </span>
          </label>

          <label class="setting-row" for="globalPlaybackKeysEnabled">
            <span class="setting-copy">
              <span class="setting-title">Enable Playback Keybinds</span>
              <span class="setting-description">Use left, right, and space to control playback even when the player is not selected.</span>
            </span>
            <span class="toggle-wrap">
              <input id="globalPlaybackKeysEnabled" name="globalPlaybackKeysEnabled" type="checkbox">
              <span class="toggle-ui" aria-hidden="true"></span>
            </span>
          </label>
        </section>

        <section class="settings-section" aria-labelledby="advanced-heading">
          <h2 id="advanced-heading" class="section-title">Advanced</h2>

          <label class="setting-row" for="debugLoggingEnabled">
            <span class="setting-copy">
              <span class="setting-title">Enable Debug Logging</span>
              <span class="setting-description">Show extension debug logs in the browser console for troubleshooting.</span>
            </span>
            <span class="toggle-wrap">
              <input id="debugLoggingEnabled" name="debugLoggingEnabled" type="checkbox">
              <span class="toggle-ui" aria-hidden="true"></span>
            </span>
          </label>
        </section>

        <p id="saveStatus" class="save-status" aria-live="polite"></p>
      </section>
    </main>

    <script src="settings.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
